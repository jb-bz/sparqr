name: CI

# Trigger on every push to main (catches direct commits and merge commits)
# and on every PR to main (catches proposed changes before they land).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── shellcheck: static analysis on every .sh file ─────────────────────
  # The package is bash, so shellcheck catches a real class of bugs
  # (unquoted vars, missing error checks, etc.) at zero cost.
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        # SC2086: double quote to prevent globbing (selective — we want
        #         string-splitting in some places)
        # SC2155: declare and assign separately (we often return from $())
        # These are the two we routinely suppress; everything else is real.
        run: |
          find . -type f -name "*.sh" -not -path "./.git/*" -print0 | xargs -0 \
            shellcheck \
              --exclude=SC2086,SC2155,SC1091,SC2317 \
              --severity=warning
        # SC1091 = source not found (we use indirect sourcing in tests)
        # SC2317 = unreachable command (false positive on ${VAR:?} patterns)

  # ── test: the full unit + integration test suite ─────────────────────
  # Runs every test_*.sh script. Each script is self-contained and exits
  # non-zero on failure, which fails the job.
  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    needs: shellcheck   # don't run tests if shellcheck already failed
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash sqlite3 curl jq git

      - name: Run all test suites
        run: |
          set -euo pipefail
          for t in tests/test_*.sh; do
            echo "━━━ $t ━━━"
            bash "$t"
          done

      - name: Show test summary
        if: always()
        run: |
          echo "Test results above. Each suite prints its own pass/fail summary."

  # ── preflight: smoke test that the package's own preflight works ──────
  # The preflight is what users run before installing. If CI shows the
  # preflight is broken in our own env, the test suite can't catch
  # that (the suite is hermes-aware but the preflight checks the OS).
  preflight:
    name: Preflight check (smoke test)
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Run prerequisites check
        run: |
          # On a fresh ubuntu-latest runner, bash is 5.x, sqlite3/curl/jq/git
          # are installed by setup above, and yq may or may not be.
          # The preflight should PASS (return 0) when the optional warnings
          # are the only issues.
          # We source lib/preflight.sh directly and call sparc_preflight_check
          # to test it in isolation (no hermes install in CI).
          bash -c 'source lib/preflight.sh && sparc_preflight_check'

  # ── integration: slow integration tests against real Hermes ──────────
  # These tests use the record-replay harness:
  #   - On main merges: bring up Docker, re-record sessions, run tests
  #     against the real Hermes. This catches real-Hermes compatibility
  #     issues early.
  #   - On PR builds: skip these tests. They're slow and require Docker
  #     which GitHub-hosted PR runners may not have access to (Docker
  #     is restricted on PR-from-fork runners for security).
  #
  # The test framework (record-replay) means local devs without Docker
  # can still run the integration tests against recorded sessions via
  # `bash tests/integration/test_setup_against_hermes.sh`.
  integration:
    name: Integration tests (against real Hermes)
    runs-on: ubuntu-latest
    needs: [shellcheck, test]   # only run after unit tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y bash sqlite3 curl jq git python3

      - name: Run integration tests in replay mode (no container)
        # First pass: run against recorded sessions. Fast, no Docker
        # needed. Verifies the record-replay harness works.
        run: |
          cd tests/integration
          bash test_setup_against_hermes.sh

      - name: Re-record sessions against real Hermes (if container available)
        # Optional step: only runs if a container runtime is available.
        # CI runners have Docker by default. Local devs with OrbStack
        # can run this locally before pushing to verify their changes
        # work against real Hermes.
        # The hermes-org/sparqr:0.x Docker image is a placeholder for
        # when the official Hermes Docker image is published. Until
        # then, this step is skipped and we rely on the recorded
        # fixtures from the prior session.
        env:
          # Default to docker in CI; allow override via repo variable.
          # Users can set SPARC_RUNTIME_REPO_VAR in their repo settings
          # to "orbstack" or "none".
          SPARC_RUNTIME: ${{ vars.SPARC_RUNTIME || 'docker' }}
        run: |
          # Detect which container runtime is available
          RUNTIME=""
          if command -v docker >/dev/null 2>&1; then
            RUNTIME="docker"
          elif command -v orb >/dev/null 2>&1 || [[ -d "$HOME/.orbstack" ]]; then
            RUNTIME="orbstack"
          fi

          if [[ -z "$RUNTIME" ]]; then
            echo "  ! No container runtime available; skipping re-recording."
            echo "  ! Integration tests run against the existing recorded fixture."
            exit 0
          fi

          echo "  → Using container runtime: $RUNTIME"
          # The hermes-org/sparqr:0.x image doesn't exist yet. When it
          # does, uncomment the lines below and replace the image name.
          #
          # cd tests/integration
          # $RUNTIME compose up -d hermes
          # RECORD_REPLAY_MODE=record ./run-all.sh
          # $RUNTIME compose down
          echo "  ! Re-recording step is a no-op until the official Hermes Docker image ships."
          echo "  ! The recorded fixtures in tests/integration/fixtures/ are the source of truth."
